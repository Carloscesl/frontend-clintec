@if (modalService.modal()) {
  <div class="overlay" (click)="modalService.cerrar()">
    <div class="modal" (click)="$event.stopPropagation()">
      <div
        class="modal-icono"
        [class.icono-exito]="modalService.modal()?.tipo === 'exito'"
        [class.icono-error]="modalService.modal()?.tipo === 'error'"
      >
        @if (modalService.modal()?.tipo === 'exito') {
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="20 6 9 17 4 12" />
          </svg>
        } @else {
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        }
      </div>

      <h2 class="modal-titulo">{{ modalService.modal()?.titulo }}</h2>
      <p class="modal-mensaje">{{ modalService.modal()?.mensaje }}</p>

      <button
        class="modal-btn"
        [class.btn-exito]="modalService.modal()?.tipo === 'exito'"
        [class.btn-error]="modalService.modal()?.tipo === 'error'"
        (click)="modalService.cerrar()"
      >
        Aceptar
      </button>
    </div>
  </div>
}
