<div class="auth-container">
  <div class="auth-card">
    <h2 class="auth-title">Clintec - Crear Cuenta</h2>

    <form (submit)="onRegister(); $event.preventDefault()">
      <div class="form-group">
        <label for="nombreUser">Nombre completo</label>
        <input
          type="text"
          id="nombreUser"
          [(ngModel)]="nombreUser"
          name="nombreUser"
          placeholder="Ej: Carlo Sanchez"
          required
        />
      </div>

      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input
          type="email"
          id="email"
          [(ngModel)]="email"
          name="email"
          placeholder="correo@ejemplo.com"
          required
        />
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input
          type="password"
          id="password"
          [(ngModel)]="password"
          name="password"
          placeholder="Mínimo 6 caracteres"
          required
        />
      </div>

      <button type="submit" class="btn-primary">Registrarse</button>
    </form>

    <p class="auth-footer">¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión aquí</a></p>
  </div>
</div>
