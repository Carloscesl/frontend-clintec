@if (loading()) {
  <div class="loading">Cargando usuarios...</div>
}

<!-- Error -->
@if (error()) {
  <div class="error">
    {{ error() }}
    <button (click)="cargar()">Reintentar</button>
  </div>
}

<!-- Tabla -->
@if (!loading()) {
  <div class="header">
    <h2>Usuarios</h2>
    <button (click)="irACrear()">+ Nuevo usuario</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Nombre</th>
        <th>Email</th>
        <th>Rol</th>
        <th>Estado</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      @for (u of usuarios(); track u.id) {
        <tr>
          <td>{{ u.nombre }}</td>
          <td>{{ u.email }}</td>
          <td>{{ u.rol }}</td>
          <td>
            <span [class]="u.activo ? 'badge-activo' : 'badge-inactivo'">
              {{ u.activo ? 'Activo' : 'Inactivo' }}
            </span>
          </td>
          <td>
            <button (click)="irAEditar(u.id)">Editar</button>
            <button
              (click)="toggleEstado(u.email, u.activo, u.id)"
              [disabled]="accionando() === u.id"
            >
              {{ accionando() === u.id ? '...' : u.activo ? 'Desactivar' : 'Activar' }}
            </button>
          </td>
        </tr>
      }
    </tbody>
  </table>
}
